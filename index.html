<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" >
        <meta name="viewport" content="width=device-width, initial-scale=1.0" >
        <title>Commander une brochure gratuite</title>
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/style.css">
        
    </head>
    <body>
        <a class="screen-reader-only focusable" href="#contenu-principal">Aller au contenu principal</a>
        <header>
<h1>Commander un brochure gratuite</h1>
        </header>
        <main id="contenu-principal">
            <form>
            <h2>
                <img class="brochure" src="images/icon-format-brochure.svg" alt="Brochure de la bibliothèque">
                FORMAT DE LA BROCHURE</h2>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <fieldset>
                        <legend>Choisissez le format de la brochure</legend>
                        <ul>
                            <li>
                                <input class="screen-reader-only" type="radio" name="brochure_choix" id="brochure_imprime" value="imprime">
                                <label for="brochure_imprime">
                                    <img class="icone-imprime" src="images/icon-file-print.svg" alt="">
                                     Imprimé </label>
                            </li>
                             <li>
                                <input class="screen-reader-only" type="radio" name="brochure_choix" id="brochure_PDF" value="PDF">
                                <label for="brochure_PDF">
                                    <img class="icone-PDF" src="images/icon-file-pdf.svg" alt="">
                                    PDF 
                                </label>
                            </li>
                             <li>
                                <input class="screen-reader-only" type="radio" name="brochure_choix" id="brochure_ePub" value="ePub">
                                <label for="brochure_ePub">
                                    <img class="icone-ePub" src="images/icon-file-epub.svg" alt="">
                                    ePub 
                                </label>
                            </li>
                        </ul>
                    </fieldset>
                </div>
            </div>
            <h2>
                <img class="contact" src="images/icon-contact.svg" alt="informations de contact">
                INFORMATIONS DE CONTACT</h2>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <fieldset>
                        <legend>Nom</legend>
                    <input
                        class="champ--nom"
                        id="nom"
                        name="Nom"
                        type="text"
                        required
                        pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s\-]+" 
                        title="Lettres seulement, tirets et espaces acceptés"
                    >
                    </fieldset>
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <fieldset>
                        <legend>Prénom</legend>
                    <input
                        class="champ--prenom"
                        id="prenom"
                        name="Prenom"
                        type="text"
                        required
                        pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s\-]+"
                        title="Lettres seulement, tirets et espaces acceptés"
                    >
                    </fieldset>
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <fieldset>
                        <legend>Courriel (exemple@domaine.com)</legend>
                    <input
                        class="champ--courriel"
                        id="courriel"
                        name="courriel"
                        type="email"
                        required
                    >
                    </fieldset>
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <fieldset>
                        <legend>Téléphone (514 555 0123)</legend>
                    <input
                        class="champ--telephone"
                        id="telephone"
                        name="telephone"
                        type="tel"
                        required
                        pattern="[\d\s\-\+\(\)]+" 
                        title="Chiffres, espaces, tirets et parenthèses acceptés (ex: 514 555 0123)"
                    >
                    </fieldset>
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <h2>
                <img class="postales" src="images/icon-postal.svg" alt="informations postales">
                INFORMATIONS POSTALES</h2>
            <div class="champ ctnValidation">
  <div class="champ__conteneur">    
    <fieldset>
        <legend>Adresse</legend>
        <input
      class="champ--adresse"
      id="adresse"
      name="adresse"
      type="text"
      required
      pattern=".+" 
      title="Veuillez entrer votre adresse"
    >
    </fieldset>
  </div>
  <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
  <div class="champ__conteneur">
    <fieldset>
        <legend>Pays</legend>
    <input
      class="champ--pays"
      id="pays"
      name="pays"
      type="text"
      required
      pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s\-]+" 
      title="Lettres seulement"
    >
    </fieldset>
  </div>
  <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
    <div class="champ__conteneur">
        <fieldset>
            <legend>Province ou État</legend>
        <input
        class="champ--province-ou-etat"
        id="province-ou-etat"
        name="Province ou état"
        type="text"
        required
        pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s\-]+" 
        title="Lettres seulement"
        >
        </fieldset>
    </div>
    <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
    <div class="champ__conteneur">
        <fieldset>
            <legend>Code postal</legend>
        <input
        class="champ--code-postal"
        id="code-postal"
        name="code postal"
        type="text"
        required
        pattern="[A-Za-z]\d[A-Za-z][\s\-]?\d[A-Za-z]\d" 
        title="Format canadien attendu (ex: G1A 1B2)"
        >
        </fieldset>
    </div>
    <p class="champ__erreur erreur"></p>
</div>
<footer>
<div class="champ ctnValidation">
    <div class="champ__conteneur champ__conteneur--consentement">
        <input class="champ--consentement" type="checkbox" id="consentement" name="consentement" required>
        <label class="champ__etiquette" for="consentement">Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et
ressources disponibles.</label>
    </div>
    <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
    <div class="champ__conteneur champ__conteneur--soumettre">
        <button class="champ--soumettre" id="commander" name="commander" type="submit">
                    Commander<img class="icone-flèche" src="images/icon-arrow.svg" alt="commander">
</button>

    </div>
    </div>
    </footer> 
        </form>   
        </main>
        </body>
</html>
