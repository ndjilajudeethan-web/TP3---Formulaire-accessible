<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commander une brochure gratuite</title>
        <style>
            .screen-reader-only {
  border: 0; /* Supprime toute bordure visible */
  clip: rect(0 0 0 0); /* Decoupe la zone rendue a 0 pour ne rien afficher */
  height: 1px; /* Conserve une taille minimale pour rester present dans l'arbre d'accessibilite */
  width: 1px; /* Meme principe que height: element present mais quasi invisible */
  margin: -1px; /* Retire l'impact visuel dans le flux de mise en page */
  overflow: hidden; /* Cache tout contenu qui depasserait la boite */
  padding: 0; /* Evite d'agrandir la zone masquee */
  position: absolute; /* Sort l'element du flux normal pour ne pas perturber la mise en page */
}

.screen-reader-only.focusable:active, /* Rendre visible pendant l'activation clavier/souris */
.screen-reader-only.focusable:focus {
  /* Rendre visible quand l'element recoit le focus clavier */
  clip: auto; /* Annule la decoupe pour afficher completement l'element */
  height: auto; /* Restaure la hauteur normale pour une lecture visuelle */
  margin: 0; /* Reinitialise la marge pour un positionnement normal */
  overflow: visible; /* Laisse le contenu s'afficher entierement */
  position: static; /* Replace l'element dans le flux pour qu'il apparaisse a l'ecran */
  width: auto; /* Restaure la largeur normale */
}
ul{
    list-style-type:none;
    padding: 0;
    display:flex;
    gap: 1rem;
}

label {
    display: inline-block;
    background-color: blue;
    color: white;
    border-radius: 1rem;
    padding:0.55rem;
    cursor: pointer;
}
input[type=radio]:checked + label {
    outline: 2px solid blue;
    outline-offset: 2px;
}
        </style>
    </head>
    <body>
        <header>

        </header>
        <main>
            <h1>FORMAT DE LA BROCHURE</h1>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <label class="champ__etiquette" for="format">Format</label>
                <form action="">
                    <fieldset>
                        <legend>Format de la brochure</legend>
                        <ul>
                            <li>
                                <input class="screen-reader-only" type="radio" name="brochure_choix" id="brochure_imprime">
                                <label for="brochure_imprime"> Imprimé </label>
                            </li>
                             <li>
                                <input class="screen-reader-only" type="radio" name="brochure_choix" id="brochure_PDF">
                                <label for="brochure_pdf"> PDF </label>
                            </li>
                             <li>
                                <input class="screen-reader-only" type="radio" name="brochure_choix" id="brochure_ePub">
                                <label for="brochure_epub"> ePub </label>
                            </li>
                        </ul>
                    </fieldset>
                </form>
                </div>
            <h2>INFORMATIONS DE CONTACT</h2>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <label class="champ__etiquette" for="Prenom">Prénom</label>
                    <input
                        class="champ--prenom"
                        id="Prenom"
                        name="Prenom"
                        type="text"
                        required
                    />
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <label class="champ__etiquette" for="Nom">Nom</label>
                    <input
                        class="champ--nom"
                        id="Nom"
                        name="Nom"
                        type="text"
                        required
                    />
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <label class="champ__etiquette" for="courriel">Courriel</label>
                    <input
                        class="champ--courriel"
                        id="courriel"
                        name="courriel"
                        type="email"
                        required
                    />
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <div class="champ ctnValidation">
                <div class="champ__conteneur">
                    <label class="champ__etiquette" for="telephone">Téléphone</label>
                    <input
                        class="champ--telephone"
                        id="telephone"
                        name="telephone"
                        type="tel"
                        required
                    />
                </div>
                <p class="champ__erreur erreur"></p>
            </div>
            <h1>INFORMATIONS POSTALES</h1>
            <div class="champ ctnValidation">
  <div class="champ__conteneur">
    <label class="champ__etiquette" for="adresse">Adresse</label>
    <input
      class="champ--adresse"
      id="adresse"
      name="adresse"
      type="text"
      required
    />
  </div>
  <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
  <div class="champ__conteneur">
    <label class="champ__etiquette" for="pays">Pays</label>
    <input
      class="champ--pays"
      id="pays"
      name="pays"
      type="text"
      required
    />
  </div>
  <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
    <div class="champ__conteneur">
        <label class="champ__etiquette" for="Province ou État">Province ou État</label>
        <input
        class="champ--province-ou-état"
        id="Province ou État"
        name="Province ou État"
        type="text"
        required
        />
    </div>
    <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
    <div class="champ__conteneur">
        <label class="champ__etiquette" for="code postal">Code postal</label>
        <input
        class="champ--code-postal"
        id="code postal"
        name="code postal"
        type="text"
        required
        />
    </div>
    <p class="champ__erreur erreur"></p>
</div>
        </main>
        <footer>
<div class="champ ctnValidation">
    <div class="champ__conteneur">
        <input class="champ--consentement" type="radio" id="consentement" name="consentement" required>
        <label class="champ__etiquette" for="consentement">Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et
ressources disponibles.</label>
    </div>
    <p class="champ__erreur erreur"></p>
</div>
<div class="champ ctnValidation">
    <div class="champ__conteneur">
        <button class="champ--soumettre" id="commander" name="commander" type="submit">Commander</button>
        </footer>      
    </body>
</html>
